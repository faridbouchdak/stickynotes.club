title: StickyNotes.club Help Centre
description: User guide for StickyNotes.club

url: "https://docs.stickynotes.club"
baseurl: ""

remote_theme: just-the-docs/just-the-docs

color_scheme: stickynotes

favicon_ico: "/assets/images/favicon.svg"

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

aux_links:
  "Open StickyNotes.club →":
    - "https://www.stickynotes.club"

aux_links_new_tab: true

footer_content: 'Copyright &copy; 2026 StickyNotes.club.'

back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

nav_sort: case_sensitive

plugins:
  - jekyll-remote-theme
